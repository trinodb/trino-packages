name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

defaults:
  run:
    shell: bash --noprofile --norc -Eeuo pipefail {0}

env:
  # Use Maven wrapper from repo with Maven version and other configs
  MAVEN: ./mvnw -B

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: [25]
    timeout-minutes: 20
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Install required Java distribution
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
      - name: Build with Maven
        run: $MAVEN clean verify -Pci

  custom-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Build custom-docker image
        # Restrict to amd64 to avoid QEMU emulation for arm64 on ubuntu-latest
        # runners. The Dockerfile is architecture-agnostic, so a single-arch
        # build is enough to verify the bundled customization and plugin downloads.
        run: ./build.sh -a amd64
        working-directory: custom-docker
